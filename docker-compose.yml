version: '3.8'
services:
  collector:
    build: .
    ports: ["8002:8002"]
    environment:
      - DATABASE_URL=postgresql://llmops:llmops@postgres:5432/llmops
    depends_on: [postgres, prometheus]

  prometheus:
    image: prom/prometheus:v2.51.0
    ports: ["9090:9090"]
    volumes: ["./prometheus.yml:/etc/prometheus/prometheus.yml"]

  grafana:
    image: grafana/grafana:10.4.0
    ports: ["3001:3000"]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on: [prometheus]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: llmops
      POSTGRES_PASSWORD: llmops
      POSTGRES_DB: llmops
    ports: ["5433:5432"]
